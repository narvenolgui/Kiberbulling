<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Кибербуллинг: как защитить себя и не стать жертвой</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: linear-gradient(145deg, #0a2f44, #0a1a2a);
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .game-container {
            max-width: 950px;
            width: 100%;
            background: rgba(0, 30, 45, 0.85);
            backdrop-filter: blur(4px);
            border-radius: 48px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.1);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #0077b6, #00b4d8);
            padding: 20px 28px;
            text-align: center;
        }
        .header h1 {
            font-size: 1.9rem;
            letter-spacing: -0.5px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
            color: white;
            font-weight: 900;
        }
        .header p {
            color: #fff3bf;
            font-weight: bold;
            font-size: 1rem;
        }
        .stats {
            display: flex;
            justify-content: space-between;
            background: #00000066;
            padding: 12px 28px;
            color: white;
            font-weight: bold;
            border-bottom: 1px solid #00b4d8;
        }
        .score-box, .question-counter {
            background: #00000099;
            padding: 5px 14px;
            border-radius: 60px;
            font-size: 1.2rem;
        }
        .content {
            padding: 28px;
        }
        .intro-slide {
            background: #0f2c3a;
            border-radius: 32px;
            padding: 28px;
            text-align: center;
        }
        .intro-slide h2 {
            color: #ffd966;
            margin-bottom: 20px;
            font-size: 1.8rem;
        }
        .intro-slide p, .intro-slide ul {
            color: #f0f0f0;
            font-size: 1.1rem;
            line-height: 1.5;
            margin-bottom: 20px;
            text-align: left;
        }
        .intro-slide ul {
            padding-left: 25px;
        }
        .intro-slide li {
            margin: 10px 0;
        }
        .chat-container {
            background: #0f2c3a;
            border-radius: 32px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .chat-window {
            background: #1a3a4a;
            border-radius: 24px;
            padding: 20px;
            height: 400px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }
        .message {
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 20px;
            font-size: 0.95rem;
            line-height: 1.4;
            animation: fadeIn 0.2s ease;
            font-weight: 500;
        }
        .message-left {
            background: #2c5a6e;
            color: #ffffff;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }
        .message-right {
            background: #ffaa33;
            color: #1f1a00;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            font-weight: bold;
        }
        .system-message {
            background: #000000cc;
            color: #ffdd99;
            text-align: center;
            font-style: italic;
            padding: 10px;
            border-radius: 20px;
            font-size: 0.85rem;
            border: 1px solid #ffaa55;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .chat-controls {
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        .chat-next-btn {
            background: linear-gradient(95deg, #00b4d8, #0077b6);
            border: none;
            padding: 12px 28px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 60px;
            cursor: pointer;
            font-family: inherit;
            transition: 0.1s;
            color: white;
        }
        .chat-reset-btn {
            background: #2a3a52;
            border: 1px solid #00b4d8;
            color: white;
            padding: 12px 28px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 60px;
            cursor: pointer;
            font-family: inherit;
        }
        .demo-complete {
            margin-top: 20px;
            text-align: center;
        }
        .next-btn, .to-practice-btn, .restart-btn {
            background: linear-gradient(95deg, #00b4d8, #0077b6);
            border: none;
            width: 100%;
            padding: 16px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 60px;
            margin-top: 20px;
            cursor: pointer;
            font-family: inherit;
            transition: 0.1s;
            color: white;
        }
        .scenario {
            background: #0f2c3a;
            border-radius: 32px;
            padding: 24px;
            margin-bottom: 28px;
            border-left: 8px solid #00b4d8;
        }
        .scenario h2 {
            color: #ffd966;
            margin-bottom: 18px;
            font-size: 1.7rem;
        }
        .message-text {
            background: #1a3a4a;
            padding: 18px;
            border-radius: 24px;
            margin: 20px 0;
            font-style: italic;
            border: 1px solid #00b4d8;
            color: #f5f5f5;
            font-weight: normal;
            line-height: 1.4;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin: 24px 0;
        }
        .option-btn {
            background: #1e3a4a;
            border: none;
            padding: 14px 18px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: bold;
            text-align: left;
            cursor: pointer;
            transition: 0.1s;
            color: white;
            font-family: inherit;
            border: 1px solid #00b4d8;
        }
        .option-btn:hover {
            background: #2a5a6e;
            border-color: #ffd966;
        }
        .feedback {
            background: #000000cc;
            padding: 16px;
            border-radius: 28px;
            margin-top: 20px;
            font-weight: bold;
            border-left: 6px solid #00b4d8;
            color: #f5f5f5;
        }
        .green-feedback { color: #ccffcc; border-left-color: #2eff2e; }
        .red-feedback { color: #ffcccc; border-left-color: #ff4444; }
        .manipulation-card {
            background: #fff3e0;
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 20px;
            border: 2px solid #00b4d8;
        }
        .manipulation-card h2 {
            color: #b45f06;
        }
        .manipulation-question {
            background: #ffffff;
            padding: 16px;
            border-radius: 24px;
            font-size: 1.1rem;
            margin-bottom: 18px;
            color: #1e2a3e;
            font-weight: bold;
            border: 1px solid #00b4d8;
        }
        .manipulation-options {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 12px;
        }
        .manip-btn {
            background: #ffdd99;
            border: none;
            padding: 10px 20px;
            border-radius: 60px;
            font-weight: bold;
            cursor: pointer;
            color: #3d2b1a;
            font-family: inherit;
            border: 1px solid #ccaa66;
        }
        .manip-btn:hover {
            background: #ffcc66;
        }
        .manip-feedback {
            margin-top: 12px;
            font-weight: bold;
            background: #fff3e0;
            padding: 12px;
            border-radius: 20px;
            color: #2c2c2c;
        }
        .final-screen {
            background: #fef7e0;
            border-radius: 32px;
            padding: 24px;
            text-align: center;
            color: #1f1a00;
            border: 2px solid #00b4d8;
        }
        .final-screen h2 {
            color: #b45f06;
        }
        .final-screen p {
            color: #2c2c2c;
            font-size: 1.1rem;
        }
        .bright-rules {
            background: linear-gradient(135deg, #ffcc33, #ffaa00);
            color: #1f1a00;
            border-radius: 32px;
            padding: 20px;
            margin: 20px 0;
            text-align: left;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
            border: 2px solid #fff1b5;
        }
        .bright-rules p {
            font-size: 1rem;
            margin: 12px 0;
            font-weight: bold;
            color: #1f1a00;
        }
        .bright-rules p:first-child {
            font-size: 1.4rem;
            text-align: center;
            margin-bottom: 16px;
        }
        .copyright {
            text-align: center;
            font-size: 0.75rem;
            padding: 18px;
            color: #aaa;
            border-top: 1px solid #2a3a55;
            background: #03060e;
        }
        @media (max-width: 550px) {
            .content { padding: 18px; }
            .message-left, .message-right { max-width: 95%; }
        }
    </style>
</head>
<body>
<div class="game-container" id="gameRoot">
    <div class="header">
        <h1>🛡️ КИБЕРБУЛЛИНГ</h1>
        <p>Как распознать, противостоять и защитить себя в сети</p>
    </div>
    <div class="stats">
        <div class="score-box">🎯 Очки: <span id="scoreValue">0</span></div>
        <div class="question-counter">📋 <span id="phaseLabel">Вступление</span> <span id="qCurrent">1</span> / <span id="qTotal">3</span></div>
    </div>
    <div class="content" id="dynamicContent"></div>
    <div class="copyright">
        Профилактика кибербуллинга · 2026
    </div>
</div>
<script>
    // --------------------------------------------------------------
    //  ВСТУПИТЕЛЬНЫЕ СЛАЙДЫ
    // --------------------------------------------------------------
    const introSlides = [
        { title: "🚨 Что такое кибербуллинг?",
          text: "Кибербуллинг — это травля, оскорбления, угрозы или распространение личной информации с использованием цифровых технологий (соцсети, мессенджеры, онлайн-игры).<br><br>По статистике, каждый третий подросток сталкивался с кибербуллингом. Последствия: депрессия, тревожность, снижение успеваемости, а в тяжёлых случаях — суицидальные мысли.",
          list: null },
        { title: "⚖️ Ответственность и последствия",
          text: "Кибербуллинг — это не просто «шутки». За оскорбления, угрозы, распространение личных данных предусмотрена ответственность:",
          list: ["• Административная (штрафы) — ст. 5.61 КоАП РФ", "• Уголовная — за угрозы убийством (ст. 119), клевету (ст. 128.1), доведение до самоубийства (ст. 110)", "• Блокировка аккаунтов, удаление контента", "• Психологическая помощь жертвам"] },
        { title: "🎯 Как работает урок",
          text: "Сначала разберём типичный диалог буллера в мессенджере «Макс». Затем ты сам потренируешься в 4 реальных ситуациях (игра). После этого разберём психологические манипуляции и типичные ошибки жертв. В конце — яркая памятка с правилами безопасности.",
          list: null }
    ];

    // --------------------------------------------------------------
    //  ДЕМО-ДИАЛОГ (чат с буллером в «Макс»)
    // --------------------------------------------------------------
    const demoMessages = [
        { type: "left", text: "Привет, слабак! Ты такой тупой, что даже не сможешь ответить. Все в классе смеются над тобой." },
        { type: "right", text: "Отстань... Что я тебе сделал?" },
        { type: "left", text: "Ты ничтожество. Смотри, я заскринил твои старые фото из ВК, сейчас разошлю всем в группу, поржем." },
        { type: "right", text: "Пожалуйста, не надо. Это личное." },
        { type: "left", text: "А то что? Пожалуешься мамочке? Ты лох, просто сиди и не высовывайся." },
        { type: "system", text: "⚠️ Типичная схема буллинга: унижение, угроза распространения личной информации, давление на чувство страха и стыда." },
        { type: "right", text: "Я не буду молчать. Я сохраню скриншоты, заблокирую тебя и сообщу классному руководителю." },
        { type: "system", text: "✅ ПРАВИЛЬНО! Не отвечай агрессией, фиксируй доказательства, обращайся к взрослым. Никто не имеет права тебя унижать." }
    ];

    // --------------------------------------------------------------
    //  ИГРОВЫЕ СЦЕНАРИИ (4 ситуации)
    // --------------------------------------------------------------
    const scenarios = [
        { title: "📱 Травля в чате класса (Макс)", 
          message: "В общем чате класса в «Макс» несколько одноклассников начали писать оскорбительные сообщения в твой адрес, прикрепили твою неудачную фотографию и подписали «Урод». Ты чувствуешь стыд и злость.",
          options: ["A) Написать им в ответ грубости и угрозы", "B) Сделать скриншоты, заблокировать обидчиков, обратиться к родителям и классному руководителю", "C) Удалить чат и сделать вид, что ничего не произошло"],
          correct: 1, explanation: "✅ Скриншоты — доказательства. Блокировка прекращает контакт. Взрослые помогут разобраться. Не отвечай агрессией — это только разжигает конфликт.",
          wrongExplanations: ["❌ Ответная агрессия делает тебя таким же буллером и может привести к наказанию.", "❌ Игнорирование не решает проблему, буллинг может усилиться. Нужно действовать."],
          tip: "📌 Запомни: сохраняй доказательства, блокируй обидчиков, сообщай взрослым." },
        { title: "📸 Распространение личного фото", 
          message: "Бывший друг отправил всем в классе твоё личное фото (которое ты ему доверял) с подписью «Смотрите, какой позор». Тебе звонят и пишут, насмехаются.",
          options: ["A) Умолять его удалить, обещать деньги", "B) Обратиться к школьному психологу и написать заявление в полицию (ст. 137 УК РФ — нарушение неприкосновенности частной жизни)", "C) Разместить его личное фото в ответ"],
          correct: 1, explanation: "✅ Распространение личных фото без согласия — уголовное преступление. Психолог поможет справиться с эмоциями, полиция накажет виновного.",
          wrongExplanations: ["❌ Уговоры и деньги не помогут, буллер лишь почувствует власть.", "❌ Месть делает тебя нарушителем и усугубляет ситуацию."],
          tip: "📌 Твои личные фото — твоя собственность. Если их распространяют без спроса — это незаконно, обращайся в полицию." },
        { title: "👾 Троллинг в онлайн-игре", 
          message: "В командной онлайн игре тебя постоянно оскорбляют, намеренно проигрывают, пишут в чате «идиот, удались». Ты начинаешь ненавидеть игру и чувствуешь себя подавленно.",
          options: ["A) Начать оскорблять в ответ и жаловаться разработчикам", "B) Выйти из игры, пожаловаться на игроков модераторам, рассказать о проблеме родителям", "C) Создать новый аккаунт и притвориться другим"],
          correct: 1, explanation: "✅ Жалоба модераторам работает (аккаунты блокируют). Рассказ родителям снимет эмоциональное давление. Выход из игры — защита психики.",
          wrongExplanations: ["❌ Ответные оскорбления — игра по правилам буллера, тебя тоже заблокируют.", "❌ Смена аккаунта не решает проблему, ты просто убегаешь, а буллеры продолжают."],
          tip: "📌 В онлайн-играх используй кнопку «пожаловаться» и блокировку. Не бойся выйти из токсичного сообщества." },
        { title: "😢 Фейковый аккаунт", 
          message: "Кто-то создал поддельный аккаунт в «ВКонтакте» с твоим именем и фото, от твоего имени пишет гадости и распространяет ложную информацию. Друзья начинают тебя избегать.",
          options: ["A) Написать в поддержку ВК с просьбой удалить фейк и заявление в полицию", "B) Написать гневный пост, чтобы все знали, что это не ты", "C) Создать ответный фейк на обидчика"],
          correct: 0, explanation: "✅ Поддержка соцсети обязана удалить фейк. Полиция найдёт нарушителя по IP-адресу.",
          wrongExplanations: ["❌ Гневный пост может быть воспринят как оправдание, а не доказательство.", "❌ Ответный фейк — это уже твоё правонарушение."],
          tip: "📌 Фейковые аккаунты — повод сразу обращаться в поддержку соцсети и в полицию." }
    ];

    // --------------------------------------------------------------
    //  РАЗБОР МАНИПУЛЯЦИЙ И ТИПИЧНЫХ ОШИБОК
    // --------------------------------------------------------------
    const manipulations = [
        { text: "Буллер пишет: «Если ты расскажешь учителю, мы тебя ещё сильнее задразним, ты будешь изгоем». Какая манипуляция используется?",
          options: ["Угроза социальной изоляции", "Шантаж личными фото", "Обещание дружбы"], correct: 0,
          explanation: "✅ Угроза изоляции — чтобы заставить жертву молчать. На самом деле сообщив взрослым, ты получаешь защиту." },
        { text: "«Да это просто прикол, ты что, шуток не понимаешь?» — так буллер оправдывает оскорбления. Это называется:",
          options: ["Газлайтинг (заставить сомневаться в себе)", "Конструктивная критика", "Забота о друге"], correct: 0,
          explanation: "✅ Газлайтинг — заставить жертву думать, что она преувеличивает, а буллинг — это норма." },
        { text: "Ты решил ответить буллеру тем же: «Сам дурак, идиот». Как это обычно заканчивается?",
          options: ["Буллинг усиливается, и ты сам становишься агрессором", "Буллер извиняется", "Все забывают конфликт"], correct: 0,
          explanation: "✅ Ответная агрессия не останавливает буллинг, а разжигает его. Лучше сохранять спокойствие и фиксировать факты." },
        { text: "Что делать, если ты стал свидетелем кибербуллинга в чате?",
          options: ["Вступиться за жертву, поддержать её, сообщить модератору", "Присоединиться к буллерам, чтобы не стать изгоем", "Игнорировать, это не моё дело"], correct: 0,
          explanation: "✅ Поддержка жертвы и сообщение взрослым — активная позиция, которая останавливает травлю." }
    ];

    // --------------------------------------------------------------
    //  ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ
    // --------------------------------------------------------------
    let currentPhase = "intro";
    let introIndex = 0;
    let demoStep = 0;
    let gameIndex = 0;
    let practiceIndex = 0;
    let totalScore = 0;
    let gameAnswered = false;
    let selectedGameOpt = -1;
    let practiceAnswers = [false, false, false, false];

    const dynamicDiv = document.getElementById('dynamicContent');
    const scoreSpan = document.getElementById('scoreValue');
    const qCurrentSpan = document.getElementById('qCurrent');
    const qTotalSpan = document.getElementById('qTotal');
    const phaseLabelSpan = document.getElementById('phaseLabel');

    function updateUI() {
        scoreSpan.innerText = totalScore;
        if (currentPhase === "intro") {
            phaseLabelSpan.innerText = "Вступление";
            qTotalSpan.innerText = introSlides.length;
            qCurrentSpan.innerText = introIndex+1;
        } else if (currentPhase === "demo") {
            phaseLabelSpan.innerText = "Разбор диалога";
            qTotalSpan.innerText = demoMessages.length;
            qCurrentSpan.innerText = demoStep;
        } else if (currentPhase === "game") {
            phaseLabelSpan.innerText = "Игра";
            qTotalSpan.innerText = scenarios.length;
            qCurrentSpan.innerText = gameIndex+1;
        } else if (currentPhase === "practice") {
            phaseLabelSpan.innerText = "Разбор схем";
            qTotalSpan.innerText = manipulations.length;
            qCurrentSpan.innerText = practiceIndex+1;
        }
    }

    function renderIntro() {
        if (introIndex >= introSlides.length) {
            currentPhase = "demo";
            demoStep = 0;
            renderDemo();
            updateUI();
            return;
        }
        const slide = introSlides[introIndex];
        let html = `<div class="intro-slide"><h2>${slide.title}</h2><p>${slide.text}</p>`;
        if (slide.list) {
            html += `<ul>${slide.list.map(item => `<li>${item}</li>`).join('')}</ul>`;
        }
        html += `<button class="next-btn" id="introNextBtn">➡ ДАЛЕЕ</button></div>`;
        dynamicDiv.innerHTML = html;
        document.getElementById('introNextBtn')?.addEventListener('click', () => {
            introIndex++;
            renderIntro();
            updateUI();
        });
        updateUI();
    }

    function renderDemo() {
        if (demoStep >= demoMessages.length) {
            const completeHtml = `
                <div class="chat-container">
                    <div class="chat-window">
                        ${demoMessages.map((msg, idx) => {
                            if (idx < demoStep) {
                                if (msg.type === "left") return `<div class="message message-left">🤖 ${msg.text}</div>`;
                                if (msg.type === "right") return `<div class="message message-right">🧑 ${msg.text}</div>`;
                                if (msg.type === "system") return `<div class="system-message">📢 ${msg.text}</div>`;
                            }
                            return '';
                        }).join('')}
                    </div>
                    <div class="demo-complete">
                        <p style="color:#ffdd99; margin-bottom:15px;">✅ Диалог разобран! Теперь ты готов тренироваться.</p>
                        <button class="next-btn" id="goToGameBtn">🎮 ПЕРЕЙТИ К ИГРЕ</button>
                    </div>
                </div>
            `;
            dynamicDiv.innerHTML = completeHtml;
            document.getElementById('goToGameBtn')?.addEventListener('click', () => {
                currentPhase = "game";
                gameIndex = 0;
                gameAnswered = false;
                selectedGameOpt = -1;
                renderGame();
                updateUI();
            });
            return;
        }
        let html = `<div class="chat-container"><div class="chat-window" id="chatWindow">`;
        for (let i = 0; i < demoStep; i++) {
            const msg = demoMessages[i];
            if (msg.type === "left") html += `<div class="message message-left">🤖 ${msg.text}</div>`;
            else if (msg.type === "right") html += `<div class="message message-right">🧑 ${msg.text}</div>`;
            else if (msg.type === "system") html += `<div class="system-message">📢 ${msg.text}</div>`;
        }
        html += `</div><div class="chat-controls"><button class="chat-next-btn" id="demoNextBtn">➡ СЛЕДУЮЩАЯ РЕПЛИКА</button>`;
        if (demoStep > 0) {
            html += `<button class="chat-reset-btn" id="demoResetBtn">🔄 НАЧАТЬ ДИАЛОГ ЗАНОВО</button>`;
        }
        html += `</div></div>`;
        dynamicDiv.innerHTML = html;
        const chatWindow = document.getElementById('chatWindow');
        if (chatWindow) chatWindow.scrollTop = chatWindow.scrollHeight;
        document.getElementById('demoNextBtn')?.addEventListener('click', () => {
            if (demoStep < demoMessages.length) {
                demoStep++;
                renderDemo();
                updateUI();
            }
        });
        document.getElementById('demoResetBtn')?.addEventListener('click', () => {
            demoStep = 0;
            renderDemo();
            updateUI();
        });
        updateUI();
    }

    function renderGame() {
        if (gameIndex >= scenarios.length) {
            currentPhase = "practice";
            practiceIndex = 0;
            practiceAnswers = [false, false, false, false];
            renderPractice();
            updateUI();
            return;
        }
        const s = scenarios[gameIndex];
        let html = `
            <div class="scenario">
                <h2>${s.title}</h2>
                <div class="message-text">${s.message.replace(/\n/g, '<br>')}</div>
                <div class="options" id="optionsContainer">
        `;
        s.options.forEach((opt, idx) => {
            html += `<button class="option-btn" data-opt-index="${idx}">${opt}</button>`;
        });
        html += `</div><div id="feedbackArea" class="feedback" style="display: none;"></div>`;
        html += `<button class="next-btn" id="nextButton">➡ ДАЛЬШЕ</button></div>`;
        dynamicDiv.innerHTML = html;

        document.querySelectorAll('.option-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                if (gameAnswered) return;
                const idx = parseInt(btn.dataset.optIndex);
                handleGameAnswer(idx);
            });
        });
        const nextBtn = document.getElementById('nextButton');
        if (nextBtn) {
            nextBtn.addEventListener('click', () => {
                if (!gameAnswered) return;
                gameIndex++;
                gameAnswered = false;
                selectedGameOpt = -1;
                renderGame();
                updateUI();
            });
        }
        if (gameAnswered && selectedGameOpt !== -1) showGameFeedback();
        updateUI();
    }

    function handleGameAnswer(optIndex) {
        gameAnswered = true;
        selectedGameOpt = optIndex;
        const s = scenarios[gameIndex];
        if (optIndex === s.correct) {
            totalScore += 20;
            updateUI();
        }
        showGameFeedback();
        document.querySelectorAll('.option-btn').forEach(btn => {
            btn.style.opacity = '0.6';
            btn.style.pointerEvents = 'none';
        });
    }

    function showGameFeedback() {
        const s = scenarios[gameIndex];
        const isCorrect = (selectedGameOpt === s.correct);
        const feedbackDiv = document.getElementById('feedbackArea');
        if (!feedbackDiv) return;
        feedbackDiv.style.display = 'block';
        let feedbackText = '';
        if (isCorrect) {
            feedbackText = `<span style="color:#ccffcc;">✅ ${s.explanation}</span><br><br>${s.tip}`;
            feedbackDiv.classList.add('green-feedback');
        } else {
            let wrongMsg = (selectedGameOpt === 0) ? s.wrongExplanations[0] : (selectedGameOpt === 1 ? s.wrongExplanations[1] : s.wrongExplanations[0]);
            if (selectedGameOpt === 2 && s.wrongExplanations[1]) wrongMsg = s.wrongExplanations[1];
            feedbackText = `<span style="color:#ffcccc;">❌ ${wrongMsg}</span><br><br>${s.tip}`;
            feedbackDiv.classList.add('red-feedback');
        }
        feedbackDiv.innerHTML = feedbackText;
    }

    function renderPractice() {
        if (practiceIndex >= manipulations.length) {
            showFinalScreen();
            return;
        }
        const m = manipulations[practiceIndex];
        const alreadyAnswered = practiceAnswers[practiceIndex];
        let html = `
            <div class="manipulation-card">
                <h2 style="color:#b45f06;">🔍 Задание ${practiceIndex+1} из ${manipulations.length}</h2>
                <div class="manipulation-question">${m.text}</div>
                <div class="manipulation-options" id="manipOpts">
        `;
        m.options.forEach((opt, idx) => {
            html += `<button class="manip-btn" data-manip-idx="${idx}">${opt}</button>`;
        });
        html += `</div><div id="manipFeedback" class="manip-feedback"></div>`;
        if (!alreadyAnswered) {
            html += `<button class="next-btn" id="nextPracticeBtn" style="display:none;">➡ ДАЛЬШЕ</button>`;
        } else {
            html += `<button class="next-btn" id="nextPracticeBtn">➡ ДАЛЬШЕ</button>`;
        }
        html += `</div>`;
        dynamicDiv.innerHTML = html;

        if (!alreadyAnswered) {
            document.querySelectorAll('.manip-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    if (practiceAnswers[practiceIndex]) return;
                    const selected = parseInt(btn.dataset.manipIdx);
                    const isCorrect = (selected === m.correct);
                    if (isCorrect) {
                        totalScore += 5;
                        updateUI();
                        document.getElementById('manipFeedback').innerHTML = `<span style="color:#2e7d32;">✅ ${m.explanation}</span>`;
                    } else {
                        document.getElementById('manipFeedback').innerHTML = `<span style="color:#c62828;">❌ Неверно. ${m.explanation}</span>`;
                    }
                    practiceAnswers[practiceIndex] = true;
                    const nextBtn = document.getElementById('nextPracticeBtn');
                    if (nextBtn) nextBtn.style.display = 'block';
                    document.querySelectorAll('.manip-btn').forEach(btn => btn.disabled = true);
                });
            });
        } else {
            const feedbackDiv = document.getElementById('manipFeedback');
            if (feedbackDiv) feedbackDiv.innerHTML = `<span style="color:#b45f06;">⏩ Ты уже ответил. Нажми «ДАЛЬШЕ».</span>`;
            document.querySelectorAll('.manip-btn').forEach(btn => btn.disabled = true);
        }
        const nextBtn = document.getElementById('nextPracticeBtn');
        if (nextBtn) {
            nextBtn.addEventListener('click', () => {
                if (!practiceAnswers[practiceIndex]) return;
                practiceIndex++;
                renderPractice();
                updateUI();
            });
        }
        updateUI();
    }

    function showFinalScreen() {
        const maxGame = scenarios.length * 20;
        const maxPractice = manipulations.length * 5;
        const totalMax = maxGame + maxPractice;
        let message = '';
        if (totalScore === totalMax) {
            message = '🎉 Супер! Ты отлично знаешь, как противостоять кибербуллингу и помогать другим. Ты — сильный и осознанный пользователь!';
        } else if (totalScore >= 60) {
            message = '👍 Хорошо, но ещё есть нюансы. Пересмотри правила и будь внимателен.';
        } else {
            message = '⚠️ Ты в зоне риска. Пройди игру и разбор ещё раз — это важно для твоей безопасности в сети.';
        }
        const finalHtml = `
            <div class="final-screen">
                <h2>🏆 ИТОГОВЫЙ РЕЗУЛЬТАТ</h2>
                <p style="font-size:1.8rem; margin:15px 0;">${totalScore} / ${totalMax}</p>
                <p>${message}</p>
                <div class="bright-rules">
                    <p>🔥 ГЛАВНЫЕ ПРАВИЛА — ЗАПОМНИ НАВСЕГДА!</p>
                    <p>1️⃣ Не отвечай агрессией на агрессию. Сохраняй спокойствие и фиксируй доказательства (скриншоты, ссылки).</p>
                    <p>2️⃣ Блокируй обидчиков во всех соцсетях и мессенджерах («Макс», «ВКонтакте» и др.).</p>
                    <p>3️⃣ Обратись за помощью: родители, классный руководитель, школьный психолог, линия помощи «Дети онлайн» (8-800-25-000-15).</p>
                    <p>4️⃣ Никогда не распространяй личную информацию (фото, адрес, пароли) незнакомцам.</p>
                    <p>5️⃣ Если ты стал свидетелем буллинга — поддержи жертву, сообщи взрослым, не будь равнодушным.</p>
                    <p style="color:#aa2e00;">⚖️ Помни: за оскорбления и угрозы в сети есть реальная ответственность (штрафы, уголовные статьи).</p>
                </div>
                <button class="restart-btn" id="fullRestartBtn">🔄 Пройти всё заново</button>
            </div>
        `;
        dynamicDiv.innerHTML = finalHtml;
        document.getElementById('fullRestartBtn')?.addEventListener('click', () => {
            currentPhase = "intro";
            introIndex = 0;
            demoStep = 0;
            gameIndex = 0;
            practiceIndex = 0;
            totalScore = 0;
            gameAnswered = false;
            selectedGameOpt = -1;
            practiceAnswers = [false, false, false, false];
            renderIntro();
            updateUI();
        });
    }

    renderIntro();
    updateUI();
</script>
</body>
</html>
